name: Update Arknights Resource for Mower

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Check Update
        id: check
        run: |
          REMOTE_VER=$(curl -sL https://raw.githubusercontent.com/yuanyan3060/ArknightsGameResource/main/version)
          LOCAL_VER=$(cat version 2>/dev/null || echo "none")
          TARGET_VER=$(curl -sL -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" "https://raw.githubusercontent.com/NiceAfternoon/arknights-mower/feature/auto_get_res_new/version" || echo "none")

          echo "REMOTE_VERSION=$REMOTE_VER" >> $GITHUB_ENV

          if [ "$REMOTE_VER" != "$LOCAL_VER" ] || [ "$REMOTE_VER" != "$TARGET_VER" ]; then
            echo "detected=true" >> $GITHUB_OUTPUT
          fi

      - name: Sync Upstream and Generate
        if: steps.check.outputs.detected == 'true'
        run: |

          rm -rf ArknightsGameResource
          git clone --depth 1 --filter=blob:none --sparse https://github.com/yuanyan3060/ArknightsGameResource.git
          cd ArknightsGameResource
          git sparse-checkout set gamedata/excel/ item/ avatar/ building/
          cd ..
          
          echo "${{ env.REMOTE_VERSION }}" > version
          
          pip install opencv-python-headless numpy Pillow scikit-image scikit-learn
          PYTHONPATH=$(pwd)/generator python generator/auto_get_res_new.py

      - name: Commit to Current Repo
        if: steps.check.outputs.detected == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f ArknightsGameResource/ version resource/
          git diff-index --quiet HEAD || (git commit -m "chore: sync to version ${{ env.REMOTE_VERSION }}" && git push)

      - name: Push to Target Repo
        if: steps.check.outputs.detected == 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.SYNC_TOKEN }}
          external_repository: NiceAfternoon/arknights-mower
          publish_branch: feature/auto_get_res_new
          publish_dir: .
          keep_files: true
          exclude_assets: '.github,ArknightsGameResource,generator,README.md'