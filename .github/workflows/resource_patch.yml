name: 自动生成资源差分包

on:
  push:
    branches: [ "main" ]
    paths:
      - 'resource/arknights_mower/data/version.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-generation:
    runs-on: ubuntu-latest
    steps:
      - name: 检出当前仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装系统解压工具 (支持 RAR)
        run: |
          sudo apt-get update
          sudo apt-get install -y unrar jq

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3 rarfile

      - name: 执行差分包生成脚本
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python generator/generate_patch.py

      - name: 提交并推送到本仓库
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add patch/
          if git diff --cached --quiet; then
            echo "没有新的差分包生成，跳过推送。"
          else
            RES_VER=$(jq -r '.res_version // .last_updated' resource/arknights_mower/data/version.json)
            git commit -m "chore(patch): 自动生成增量包至资源版本 $RES_VER"
            git push
          fi

      - name: 失败任务告警
        if: failure()
        run: |
          echo "::error::任务失败！请确认主仓库 Release 是否包含对应版本的 .rar/.zip 包，或检查 generate_patch.py 逻辑。"